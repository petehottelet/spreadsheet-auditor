name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LibreOffice (enables recalculation + value-dependent checks)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-calc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install build

      - name: Assert tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import spreadsheet_auditor as s; print(s.__version__)')"
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${pkg}."
            exit 1
          fi

      - name: Validate skill metadata
        run: python scripts/quick_validate.py .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Regenerate demo and benchmark for this release
        # Refresh generated artifacts so the packaged/release copies are current.
        # Not diff-gated: recalc-dependent output varies across LibreOffice
        # versions/platforms (see CI). The regenerated copies are bundled as-is.
        run: |
          python examples/make_demo.py
          python benchmarks/run_benchmark.py

      - name: Build release artifacts
        run: python scripts/build_dist.py --release

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate built skill packages
        run: |
          python scripts/quick_validate.py dist/claude/spreadsheet-auditor
          python scripts/quick_validate.py dist/codex/spreadsheet-auditor

      - name: Validate installed wheel from a neutral directory
        run: |
          set -euo pipefail
          # Exit codes 1 (findings) and 2 (coverage limitations) are valid demo
          # outcomes; only > 2 indicates a real error.
          run_ok() { set +e; "$@"; local c=$?; set -e; if [ "$c" -gt 2 ]; then echo "::error::Command exited $c: $*"; exit 1; fi; }
          wheel="$(ls dist/spreadsheet_auditor-*.whl | head -n1)"
          python -m venv /tmp/wheel-env
          /tmp/wheel-env/bin/pip install --upgrade pip
          /tmp/wheel-env/bin/pip install "${wheel}"
          workdir="$(mktemp -d)"
          cd "${workdir}"
          run_ok "/tmp/wheel-env/bin/spreadsheet-auditor" --version
          run_ok "/tmp/wheel-env/bin/spreadsheet-auditor" --demo --summary --fail-on None
          run_ok "/tmp/wheel-env/bin/spreadsheet-auditor" --demo --format sarif --out report.sarif --fail-on None
          python -c "import json; d=json.load(open('report.sarif')); assert d['version']=='2.1.0'; assert d['runs'][0]['results']"

      - name: Validate unpacked Claude/Codex skills from a neutral directory
        run: |
          set -euo pipefail
          run_ok() { set +e; "$@"; local c=$?; set -e; if [ "$c" -gt 2 ]; then echo "::error::Command exited $c: $*"; exit 1; fi; }
          repo="${GITHUB_WORKSPACE}"
          for variant in claude codex; do
            workdir="$(mktemp -d)"
            cp -r "${repo}/dist/${variant}/spreadsheet-auditor" "${workdir}/skill"
            cd "${workdir}"
            run_ok python "skill/scripts/audit.py" --demo --summary --fail-on None
            cd "${repo}"
          done

      - name: Extract changelog entry for this tag
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python - <<PY > release-notes.md
          import pathlib, re, sys
          version = "$version"
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)"
          match = re.search(pattern, text, re.S | re.M)
          if not match:
              print(f"_See [CHANGELOG.md](CHANGELOG.md) for full details._")
              sys.exit(0)
          print(match.group(1).strip())
          PY
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: |
            dist/spreadsheet_auditor-*.whl
            dist/spreadsheet_auditor-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "spreadsheet-auditor ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            dist/spreadsheet-auditor-claude.zip
            dist/spreadsheet-auditor-codex.zip
            dist/spreadsheet-auditor-source.zip
            dist/SHA256SUMS
          generate_release_notes: false
          fail_on_unmatched_files: true

  pypi-publish:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/spreadsheet-auditor
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
